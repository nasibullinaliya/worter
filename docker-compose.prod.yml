services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vocab}
      POSTGRES_USER: ${POSTGRES_USER:-vocab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vocab}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: >
        Host=postgres;
        Database=${POSTGRES_DB:-vocab};
        Username=${POSTGRES_USER:-vocab};
        Password=${POSTGRES_PASSWORD}
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required}
      Jwt__Issuer: worter-app
      Jwt__ExpiresDays: "7"
      Frontend__Url: ${FRONTEND_URL:?FRONTEND_URL is required}
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8080:8080"
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${API_URL:?API_URL is required}
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
